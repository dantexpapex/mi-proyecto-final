<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro de Médico</title>
</head>

<body>
    <h1>REGISTRO DE MÉDICO</h1>
    <a href="index.html">Volver al inicio</a> | <a href="medicos_get.html">Volver a la lista</a><br><br>

    <form name="FormularioData">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" required><br><br>

        <label for="numero_colegiatura">N° Colegiatura:</label>
        <input type="text" id="numero_colegiatura" name="numero_colegiatura" required><br><br>

        <label for="id_especialidad">ID Especialidad:</label>
        <input type="number" id="id_especialidad" name="id_especialidad" required><br><br>

        <label for="id_centro">ID Centro de Salud:</label>
        <input type="number" id="id_centro" name="id_centro" required><br><br>

        <button type="submit" id="btnguardar">Guardar</button>
        <button type="reset">Cancelar</button>
    </form>
    <script src="medicos_post.js"></script>
</body>

</html>
